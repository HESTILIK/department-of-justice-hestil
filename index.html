<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEPARTMENT OF JUSTICE — System Administracji Stanowej</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e14;
  --sidebar:#0c1119;
  --sidebar-hov:#151d2b;
  --panel:#1b2432;
  --panel-head:#161e2a;
  --panel-alt:#212b3a;
  --panel-row:#25303f;
  --panel-row-alt:#212a38;
  --border:#2e3a4c;
  --border-soft:#232d3d;
  --text:#e6ecf4;
  --text-dim:#8b98ab;
  --text-faint:#5c6a7f;
  --gold:#c9a24a;
  --gold-dim:#8a7136;
  --green:#3ea86b;
  --green-bg:#173428;
  --red:#d1554c;
  --red-bg:#3a1e1e;
  --amber:#d0973f;
  --amber-bg:#3a2c17;
  --blue:#4a8fd6;
  --purple:#9d7fd6;
  --purple-bg:#241c3a;
  --radius:2px;
  --font-mono:'IBM Plex Mono',monospace;
  --font-sans:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;overflow:hidden;}
::selection{background:var(--gold-dim);color:#fff;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--panel);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-faint);}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:inherit;outline:none;}
a{color:var(--gold);text-decoration:none;}

/* ============ LOGIN ============ */
#login-screen{position:fixed;inset:0;background:radial-gradient(ellipse at top left,#101a28 0%,transparent 55%),radial-gradient(ellipse at bottom right,#14202f 0%,transparent 55%),var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;}
#login-screen::before{content:"";position:absolute;inset:0;background-image:linear-gradient(var(--border-soft) 1px,transparent 1px),linear-gradient(90deg,var(--border-soft) 1px,transparent 1px);background-size:42px 42px;opacity:.18;pointer-events:none;}
.login-card{position:relative;width:420px;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 30px 80px -20px rgba(0,0,0,.7);overflow:hidden;}
.login-topline{height:3px;background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-dim));}
.login-body{padding:44px 40px 36px;}
.login-seal{width:64px;height:64px;margin:0 auto 18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#2a3547,#10161f);border:2px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:20px;color:var(--gold);}
.login-title{text-align:center;font-family:var(--font-mono);font-weight:700;font-size:15px;letter-spacing:2.5px;color:var(--text);margin-bottom:4px;}
.login-sub{text-align:center;font-size:11.5px;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;margin-bottom:30px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;font-weight:600;}
.field input,.field select,.field textarea{width:100%;background:var(--panel-alt);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:11px 12px;font-size:13.5px;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold-dim);}
.btn-primary{width:100%;background:linear-gradient(180deg,#c9a24a,#a9823a);color:#1a1204;font-weight:700;letter-spacing:1px;font-size:12.5px;text-transform:uppercase;padding:13px;border-radius:var(--radius);margin-top:6px;transition:filter .15s,transform .1s;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-primary:active{transform:scale(.99);}
.login-error{background:var(--red-bg);border:1px solid #5c2a26;color:#f0a29c;font-size:12px;padding:9px 12px;border-radius:var(--radius);margin-bottom:14px;display:none;}
.login-hint{margin-top:22px;padding-top:18px;border-top:1px solid var(--border-soft);font-size:11px;color:var(--text-faint);line-height:1.7;}
.login-hint b{color:var(--text-dim);}
.login-foot{text-align:center;padding:14px;font-size:10px;letter-spacing:1px;color:var(--text-faint);border-top:1px solid var(--border-soft);background:var(--panel-head);}

/* ============ APP SHELL ============ */
#app{position:fixed;inset:0;display:none;flex-direction:column;}
#app.active{display:flex;}
.topbar{height:52px;flex:none;background:var(--sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:14px;}
.topbar-seal{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#2a3547,#10161f);border:1.5px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--gold);flex:none;}
.topbar-title{font-family:var(--font-mono);font-weight:600;font-size:13px;letter-spacing:1.5px;}
.topbar-title span{color:var(--gold);}
.topbar-clock{font-family:var(--font-mono);font-size:11.5px;color:var(--text-dim);margin-left:6px;padding-left:14px;border-left:1px solid var(--border);}
.topbar-spacer{flex:1;}
.topbar-user{display:flex;align-items:center;gap:10px;}
.topbar-user-info{text-align:right;line-height:1.3;}
.topbar-user-name{font-size:12.5px;font-weight:600;}
.topbar-user-role{font-size:10px;color:var(--gold);letter-spacing:.5px;}
.topbar-avatar{width:30px;height:30px;border-radius:50%;background:var(--panel-alt);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-dim);}
.btn-logout{background:var(--panel-alt);border:1px solid var(--border);color:var(--text-dim);font-size:11px;padding:7px 12px;border-radius:var(--radius);letter-spacing:.5px;transition:all .15s;}
.btn-logout:hover{background:var(--red-bg);color:#f0a29c;border-color:#5c2a26;}
.shell{flex:1;display:flex;min-height:0;}
.sidebar{width:236px;flex:none;background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;}
.side-group-label{font-size:9.5px;letter-spacing:1.5px;color:var(--text-faint);text-transform:uppercase;padding:14px 18px 6px;font-weight:700;}
.side-item{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:12.5px;color:var(--text-dim);cursor:pointer;border-left:2px solid transparent;position:relative;transition:background .12s,color .12s;}
.side-item:hover{background:var(--sidebar-hov);color:var(--text);}
.side-item.active{background:var(--sidebar-hov);color:var(--gold);border-left-color:var(--gold);}
.side-item .ic{width:16px;text-align:center;font-size:13px;flex:none;}
.side-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:8px;}
.side-item.admin-item{color:var(--purple);}
.side-item.admin-item.active{color:var(--purple);border-left-color:var(--purple);}
.main{flex:1;overflow-y:auto;padding:22px 26px;min-width:0;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;overflow:hidden;}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--panel-head);border-bottom:2px solid var(--gold-dim);}
.panel-head h2{font-family:var(--font-mono);font-size:13px;letter-spacing:1.5px;font-weight:700;color:var(--text);}
.panel-head .meta{font-size:11px;color:var(--text-faint);margin-top:2px;font-family:var(--font-mono);}
.btn-add{background:var(--gold);color:#1a1204;font-weight:700;font-size:11.5px;letter-spacing:.5px;padding:8px 14px;border-radius:var(--radius);display:flex;align-items:center;gap:6px;transition:filter .15s;}
.btn-add:hover{filter:brightness(1.1);}
.toolbar{display:flex;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border-soft);flex-wrap:wrap;}
.search-input{flex:1;min-width:200px;background:var(--panel-alt);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--radius);font-size:12.5px;}
.search-input::placeholder{color:var(--text-faint);}
.filter-select{background:var(--panel-alt);border:1px solid var(--border);color:var(--text-dim);padding:9px 10px;border-radius:var(--radius);font-size:12px;}
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint);font-weight:700;padding:10px 16px;background:var(--panel-head);border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border-soft);transition:background .1s;}
tbody tr:nth-child(odd){background:var(--panel-row-alt);}
tbody tr:hover{background:var(--sidebar-hov);}
tbody td{padding:11px 16px;font-size:12.5px;color:var(--text);vertical-align:middle;}
td.dim{color:var(--text-dim);font-size:12px;}
td.mono{font-family:var(--font-mono);font-size:11.5px;color:var(--text-dim);}
.empty-row td{text-align:center;padding:34px;color:var(--text-faint);font-size:12.5px;font-style:italic;}
.badge{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.4px;padding:3px 9px;border-radius:10px;}
.badge-green{background:var(--green-bg);color:#7fd9a2;border:1px solid #235a3d;}
.badge-red{background:var(--red-bg);color:#f0a29c;border:1px solid #5c2a26;}
.badge-amber{background:var(--amber-bg);color:#e8c07f;border:1px solid #6b4e22;}
.badge-blue{background:#132b42;color:#8fc3ee;border:1px solid #1f4864;}
.badge-purple{background:var(--purple-bg);color:#c9b8ee;border:1px solid #4a3a70;}
.badge-gray{background:#242f3d;color:var(--text-dim);border:1px solid var(--border);}
.row-actions{display:flex;gap:6px;justify-content:flex-end;}
.icon-btn{width:28px;height:28px;border-radius:var(--radius);background:var(--panel-alt);border:1px solid var(--border);color:var(--text-dim);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .12s;}
.icon-btn:hover{color:var(--text);border-color:var(--text-faint);}
.icon-btn.danger:hover{color:#f0a29c;border-color:#5c2a26;background:var(--red-bg);}
.icon-btn.ok:hover{color:#7fd9a2;border-color:#235a3d;background:var(--green-bg);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;padding:16px 18px;}
.card{background:var(--panel-alt);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color .15s,transform .1s;position:relative;}
.card:hover{border-color:var(--gold-dim);transform:translateY(-1px);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.card-title{font-weight:700;font-size:13.5px;}
.card-sub{font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);margin-top:2px;}
.card-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex:none;}
.card-body{font-size:11.5px;color:var(--text-dim);line-height:1.9;}
.card-body b{color:var(--text);font-weight:600;}
.card-icon{width:44px;height:44px;border-radius:var(--radius);background:var(--sidebar);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px;}
.card-actions{margin-top:12px;display:flex;gap:6px;justify-content:flex-end;}
.detail-grid{display:grid;grid-template-columns:2fr 1fr;gap:0;}
.detail-main{padding:18px;border-right:1px solid var(--border-soft);}
.detail-side{padding:18px;}
.detail-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-faint);font-weight:700;margin-bottom:5px;}
.detail-value{font-size:13px;color:var(--text);margin-bottom:16px;line-height:1.6;}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-dim);cursor:pointer;padding:6px 0;}
.back-link:hover{color:var(--gold);}
.modal-overlay{position:fixed;inset:0;background:rgba(4,7,12,.72);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:600;padding:20px;}
.modal-overlay.active{display:flex;}
.modal{width:100%;max-width:620px;max-height:88vh;overflow-y:auto;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 30px 80px -20px rgba(0,0,0,.8);}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:var(--panel-head);border-bottom:2px solid var(--gold-dim);position:sticky;top:0;z-index:2;}
.modal-head h3{font-family:var(--font-mono);font-size:13px;letter-spacing:1px;}
.modal-close{width:26px;height:26px;border-radius:var(--radius);background:var(--panel-alt);border:1px solid var(--border);color:var(--text-dim);font-size:14px;}
.modal-close:hover{color:#f0a29c;}
.modal-body{padding:20px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-row.single{grid-template-columns:1fr;}
.field textarea{resize:vertical;min-height:70px;}
.modal-foot{padding:16px 20px;border-top:1px solid var(--border-soft);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--panel);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:10px 16px;border-radius:var(--radius);font-size:12px;letter-spacing:.4px;}
.btn-ghost:hover{border-color:var(--text-faint);color:var(--text);}
.btn-danger-fill{background:var(--red);color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:12px;font-weight:700;letter-spacing:.4px;}
.btn-danger-fill:hover{filter:brightness(1.1);}
#toast-wrap{position:fixed;bottom:22px;right:22px;z-index:900;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--gold);padding:12px 16px;border-radius:var(--radius);font-size:12.5px;box-shadow:0 10px 30px rgba(0,0,0,.4);min-width:240px;animation:toastin .18s ease-out;}
.toast.err{border-left-color:var(--red);}
.toast.ok{border-left-color:var(--green);}
@keyframes toastin{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.empty-state{padding:50px 20px;text-align:center;color:var(--text-faint);}
.empty-state .big{font-size:34px;margin-bottom:10px;opacity:.6;}
.empty-state .t1{font-size:13px;color:var(--text-dim);margin-bottom:4px;}
.empty-state .t2{font-size:11.5px;}
.split-two{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media (max-width:980px){.split-two{grid-template-columns:1fr}}
.tab-row{display:flex;gap:2px;padding:0 18px;background:var(--panel-head);border-bottom:1px solid var(--border-soft);}
.tab-btn{padding:11px 16px;font-size:11.5px;color:var(--text-dim);letter-spacing:.5px;border-bottom:2px solid transparent;font-weight:600;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.doc-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border-soft);font-size:12px;}
.doc-item .di-name{flex:1;color:var(--text);font-weight:500;}
.doc-item .di-meta{color:var(--text-faint);font-size:11px;font-family:var(--font-mono);}
.stat-strip{display:flex;gap:14px;padding:16px 18px;flex-wrap:wrap;}
.stat-box{flex:1;min-width:130px;background:var(--panel-alt);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.stat-box .num{font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--gold);}
.stat-box .lbl{font-size:10.5px;color:var(--text-dim);letter-spacing:.5px;margin-top:4px;text-transform:uppercase;}
.perm-matrix{width:100%;border-collapse:collapse;margin-top:6px;}
.perm-matrix th{text-align:left;font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;border-bottom:1px solid var(--border);}
.perm-matrix td{padding:6px 8px;font-size:12px;border-bottom:1px solid var(--border-soft);}
.perm-matrix select{background:var(--panel-alt);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:var(--radius);font-size:11.5px;width:100%;}
.perm-pill{display:inline-block;font-size:9.5px;padding:2px 7px;border-radius:8px;margin:1px;font-weight:600;}
.pp-write{background:var(--green-bg);color:#7fd9a2;}
.pp-read{background:#132b42;color:#8fc3ee;}
.chk-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:12.5px;}
.chk-row input{width:16px;height:16px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-topline"></div>
    <div class="login-body">
      <div class="login-seal">DOJ</div>
      <div class="login-title">DEPARTMENT OF JUSTICE</div>
      <div class="login-sub">System Administracji Stanowej &middot; San Andreas</div>
      <div class="login-error" id="login-error">Nieprawidłowy login lub hasło.</div>
      <form id="login-form">
        <div class="field">
          <label>Identyfikator urzędnika</label>
          <input type="text" id="login-user" autocomplete="username" placeholder="Login" required>
        </div>
        <div class="field">
          <label>Hasło dostępu</label>
          <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary">Zaloguj się do systemu</button>
      </form>

    </div>
    <div class="login-foot">DOJ.SA.GOV &middot; BUILD 3.0.0 &middot; POŁĄCZENIE SZYFROWANE</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-seal">DOJ</div>
    <div class="topbar-title">DEPARTMENT OF <span>JUSTICE</span></div>
    <div class="topbar-clock" id="clock">--/--/---- --:--:--</div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user">
      <div class="topbar-user-info">
        <div class="topbar-user-name" id="cur-user-name">—</div>
        <div class="topbar-user-role" id="cur-user-role">—</div>
      </div>
      <div class="topbar-avatar" id="cur-user-avatar">—</div>
      <button class="btn-logout" id="btn-logout">Wyloguj się</button>
    </div>
  </div>
  <div class="shell">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-el">
    <div class="modal-head"><h3 id="modal-title">FORMULARZ</h3><button class="modal-close" id="modal-close">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
/* =========================================================
   DEPARTMENT OF JUSTICE — System Administracji Stanowej
   Attorney General's Office = administrator systemu
   ========================================================= */

const DB_KEY = 'doj_db_v3';
const SESSION_KEY = 'doj_session_v3';

/* Departamenty, do których kierowane są wnioski w module Poczty
   i wg których przypisywane są konta urzędników. */
const DEPARTMENTS = [
  {key:'AGO', name:"Attorney General's Office"},
  {key:'DA',  name:"District Attorney's Office"},
  {key:'SC',  name:'Superior Court'},
  {key:'FTB', name:'Franchise Tax Board'},
  {key:'BAR', name:'State Bar'},
];
function deptName(key){ const d = DEPARTMENTS.find(x=>x.key===key); return d ? d.name : key; }

/* Moduły systemu podlegające nadawaniu uprawnień (odczyt / zapis). */
const MODULES = [
  {key:'cases', label:'Akta spraw'},
  {key:'businesses', label:'Przedsiębiorstwa'},
  {key:'businessRegistry', label:'Rejestr przedsiębiorstw'},
  {key:'licenses', label:'Rejestr koncesji'},
  {key:'taxes', label:'Rejestr podatków'},
  {key:'veterans', label:'Rejestr weteranów'},
  {key:'taxis', label:'Rejestr licencji taxi'},
  {key:'attorneys', label:'Rejestr adwokatów'},
  {key:'debtors', label:'Dłużnicy'},
  {key:'hearings', label:'Rozprawy sądowe'},
  {key:'gangs', label:'SA Gang Database'},
];

function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function uid(prefix){ return prefix + Math.random().toString(36).slice(2,7).toUpperCase(); }
function todayStr(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return `${p(d.getMonth()+1)}/${p(d.getDate())}/${d.getFullYear()}`; }

/* -------------------- BEZPIECZEŃSTWO: HASHOWANIE HASEŁ -------------------- */
/* Hasła nigdy nie są przechowywane jawnym tekstem — każde konto ma unikalną sól
   oraz wielokrotnie iterowany hash SHA-256 (utrudnia ataki słownikowe/bruteforce
   nawet przy dostępie do surowych danych localStorage). */
async function sha256Hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function randomSalt(){ return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join(''); }
async function hashPassword(pass, salt){
  let h = salt + ':' + pass;
  for(let i=0;i<3000;i++){ h = await sha256Hex(h); }
  return h;
}
async function setUserPassword(user, plainPass){
  const salt = randomSalt();
  user.salt = salt;
  user.passHash = await hashPassword(plainPass, salt);
  delete user.pass;
}
async function verifyUserPassword(user, plainPass){
  if(user.passHash && user.salt) return (await hashPassword(plainPass, user.salt)) === user.passHash;
  return !!user.pass && user.pass === plainPass; // zgodność wsteczna, migrowana automatycznie przy starcie
}
async function migrateLegacyPasswords(){
  let changed = false;
  for(const u of DB.users){ if(!u.passHash && u.pass){ await setUserPassword(u, u.pass); changed = true; } }
  if(changed) saveDB();
}

/* -------------------- BEZPIECZEŃSTWO: BLOKADA PRÓB LOGOWANIA -------------------- */
const GUARD_KEY = 'doj_login_guard_v1';
const LOCK_MS = 60000, MAX_FAILS = 5;
function loadGuard(){ try{ return JSON.parse(localStorage.getItem(GUARD_KEY))||{}; }catch(e){ return {}; } }
function saveGuard(g){ localStorage.setItem(GUARD_KEY, JSON.stringify(g)); }

/* -------------------- SESSION / AUTH -------------------- */
const SESSION_DURATION_MS = 8*60*60*1000;   // sesja wygasa po 8h niezależnie od aktywności
const IDLE_LIMIT_MS = 20*60*1000;           // automatyczne wylogowanie po 20 min bezczynności
let CURRENT_USER = null;

async function tryLogin(login, pass){
  const key = login.trim().toLowerCase();
  const guard = loadGuard();
  const g = guard[key] || {fails:0, lockUntil:0};
  if(g.lockUntil && Date.now() < g.lockUntil){
    return {ok:false, locked:true, secs:Math.ceil((g.lockUntil - Date.now())/1000)};
  }
  const acc = DB.users.find(a=>a.login.toLowerCase()===key);
  const ok = acc ? await verifyUserPassword(acc, pass) : false;
  if(!ok){
    g.fails = (g.fails||0) + 1;
    if(g.fails >= MAX_FAILS){ g.lockUntil = Date.now() + LOCK_MS; g.fails = 0; }
    guard[key] = g; saveGuard(guard);
    return {ok:false};
  }
  guard[key] = {fails:0, lockUntil:0}; saveGuard(guard);
  CURRENT_USER = acc;
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({login:key, exp: Date.now() + SESSION_DURATION_MS}));
  return {ok:true};
}
function restoreSession(){
  const raw = sessionStorage.getItem(SESSION_KEY);
  if(!raw) return false;
  let data; try{ data = JSON.parse(raw); }catch(e){ return false; }
  if(!data || !data.login || Date.now() > data.exp){ sessionStorage.removeItem(SESSION_KEY); return false; }
  const acc = DB.users.find(a=>a.login.toLowerCase()===data.login);
  if(!acc) return false;
  CURRENT_USER = acc;
  return true;
}
function logout(){ sessionStorage.removeItem(SESSION_KEY); CURRENT_USER=null; location.reload(); }

function canRead(moduleKey){
  if(CURRENT_USER.isAdmin) return true;
  const p = CURRENT_USER.permissions ? CURRENT_USER.permissions[moduleKey] : 'none';
  return p==='read' || p==='write';
}
function canWrite(moduleKey){
  if(CURRENT_USER.isAdmin) return true;
  const p = CURRENT_USER.permissions ? CURRENT_USER.permissions[moduleKey] : 'none';
  return p==='write';
}

/* -------------------- TOAST -------------------- */
function toast(msg, kind){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast ' + (kind||'');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2600);
}

function firstAvailableRoute(){
  const nav = buildNav();
  for(const g of nav){ if(g.items.length) return g.items[0].key; }
  return 'postal';
}

function navigate(route, param){
  const guarded = ['cases','businesses','businessRegistry','licenses','taxes','veterans','taxis','attorneys','debtors','hearings','gangs'];
  if(route==='caseDetail'){
    if(!canRead('cases')){ toast('Brak dostępu do tego modułu.','err'); route='postal'; }
  } else if(guarded.includes(route) && !canRead(route)){
    toast('Brak dostępu do tego modułu.','err'); route = firstAvailableRoute();
  } else if(route==='settings' && !CURRENT_USER.isAdmin){
    toast('Brak uprawnień administracyjnych.','err'); route='postal';
  }
  currentRoute = route;
  currentCaseId = param || null;
  renderSidebar();
  renderMain();
}

  const wrap = document.createElement('div');
  wrap.className = 'panel';
  wrap.innerHTML = `

      <div><h2>${title}</h2>${meta?`<div class="meta">${meta}</div>`:''}</div>

  if(addLabel){ wrap.querySelector('#panel-add-btn').onclick = onAdd; }

function badgeFor(status){
  const s = (status||'').toLowerCase();
  if(['aktywna','aktywny','aktywne','otwarta','zatwierdzony','przyjęty'].includes(s)) return `<span class="badge badge-green">${status}</span>`;
  if(['nieaktywna','zakończona','odrzucony','zawieszona','odesłany'].includes(s)) return `<span class="badge badge-red">${status}</span>`;
  if(['oczekujący','wersja robocza'].includes(s)) return `<span class="badge badge-amber">${status}</span>`;
  return `<span class="badge badge-gray">${status}</span>`;
}
function searchFilter(list, query, fields){
  if(!query) return list;
  const q = query.toLowerCase();
  return list.filter(item=> fields.some(f=> String(item[f]||'').toLowerCase().includes(q)));
}
function noAccessPanel(main, title){
  main.innerHTML = `<div class="panel"><div class="empty-state"><div class="big">🔒</div><div class="t1">Brak dostępu do modułu: ${title}</div><div class="t2">Skontaktuj się z administratorem systemu, aby uzyskać uprawnienia.</div></div></div>`;
}

function genericRegistry(main, opts){
  if(!canRead(opts.moduleKey)) return noAccessPanel(main, opts.title);
  const writable = canWrite(opts.moduleKey);
  const panel = panelShell(opts.title, `${DB[opts.dataKey].length} rekordów`, writable?(opts.addLabel||'Dodaj nowy wpis'):null, ()=>openRecordModal(opts, null));
  const toolbar = document.createElement('div'); toolbar.className='toolbar'; toolbar.innerHTML=`<input class="search-input" id="reg-search" placeholder="Wyszukaj...">`;
  panel.appendChild(toolbar);
  const tableWrap = document.createElement('div'); panel.appendChild(tableWrap); main.appendChild(panel);
  const showCases = opts.caseDept !== false && canRead('cases');
  function draw(){
    let list = [...DB[opts.dataKey]];
    if(opts.reverse) list.reverse();
    list = searchFilter(list, document.getElementById('reg-search').value, opts.searchFields);
    tableWrap.innerHTML = `<table><thead><tr>${opts.columns.map(c=>`<th>${esc(c.label)}</th>`).join('')}${showCases?'<th>Akta spraw</th>':''}<th></th></tr></thead>
      <tbody>
      ${list.length ? list.map((item)=>{
        const idx = DB[opts.dataKey].indexOf(item);
        return `<tr>${opts.columns.map(c=>{
          let val = item[c.key];
          if(c.type==='badge') return `<td>${badgeFor(val)}</td>`;
          if(c.type==='mono') return `<td class="mono">${esc(val ?? '')}</td>`;
          if(c.type==='dim') return `<td class="dim">${esc(val ?? '')}</td>`;
          if(c.type==='money') return `<td class="mono">$${Number(val||0).toLocaleString('en-US')}</td>`;
          return `<td>${esc(val ?? '')}</td>`;
        }).join('')}
        ${showCases?`<td data-caselink-idx="${idx}">${caseLinkCell(item)}</td>`:''}
        <td><div class="row-actions">
          ${writable?`<button class="icon-btn" data-edit="${idx}">⚙</button><button class="icon-btn danger" data-del="${idx}">🗑</button>`:''}
        </div></td></tr>`;
      }).join('') : `<tr class="empty-row"><td colspan="${opts.columns.length+(showCases?2:1)}">Brak rekordów do wyświetlenia.</td></tr>`}
      </tbody></table>`;
    tableWrap.querySelectorAll('[data-edit]').forEach(el=> el.onclick=()=>openRecordModal(opts, DB[opts.dataKey][Number(el.dataset.edit)]));
    tableWrap.querySelectorAll('[data-del]').forEach(el=> el.onclick=()=>{
      confirmDelete('Czy na pewno chcesz trwale usunąć ten wpis z rejestru?', ()=>{ DB[opts.dataKey].splice(Number(el.dataset.del),1); saveDB(); toast('Wpis usunięty z rejestru.','ok'); draw(); });
    });
    if(showCases){
      tableWrap.querySelectorAll('[data-caselink-idx]').forEach(cell=>{
        wireCaseLinkCell(cell, DB[opts.dataKey][Number(cell.dataset.caselinkIdx)], (typeof opts.caseDept==='string')?opts.caseDept:'GO');
      });
    }
  }
  document.getElementById('reg-search').addEventListener('input', draw);
  draw();
}
function openRecordModal(opts, existing){
  const isEdit = !!existing;
  const bodyHtml = opts.formFields.map(f=>{
    const val = isEdit ? (existing[f.key] ?? '') : (f.default ?? '');
    if(f.type==='select') return `<div class="field"><label>${f.label}</label><select id="ff-${f.key}">${f.options.map(o=>`<option ${val===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
    if(f.type==='textarea') return `<div class="field"><label>${f.label}</label><textarea id="ff-${f.key}">${esc(val)}</textarea></div>`;
    return `<div class="field"><label>${f.label}</label><input id="ff-${f.key}" value="${esc(val)}"></div>`;
  });
  let html = '';
  for(let i=0;i<bodyHtml.length;i+=2){ html += bodyHtml[i+1] ? `<div class="form-row">${bodyHtml[i]}${bodyHtml[i+1]}</div>` : `<div class="form-row single">${bodyHtml[i]}</div>`; }
  openModal(isEdit?'EDYTUJ WPIS':`DODAJ NOWY WPIS — ${opts.title}`, html,
    `<button class="btn-ghost" onclick="closeModal()">Anuluj</button><button class="btn-add" id="save-rec-btn">${isEdit?'Zapisz zmiany':'Dodaj wpis'}</button>`);
  document.getElementById('save-rec-btn').onclick = ()=>{
    const data = {};
    opts.formFields.forEach(f=>{ data[f.key] = document.getElementById('ff-'+f.key).value.trim(); });
    if(opts.required && !data[opts.required]){ toast('Uzupełnij wymagane pole.','err'); return; }
    if(opts.beforeSave) opts.beforeSave(data, isEdit, existing);
    if(isEdit) Object.assign(existing, data); else DB[opts.dataKey].unshift(data);
    saveDB(); closeModal(); toast(isEdit?'Wpis zaktualizowany.':'Nowy wpis dodany do rejestru.','ok'); navigate(currentRoute);
  };
}

function renderHearings(main){

  const panel = panelShell('ROZPRAWY AKTUALNE', null, writable?'Dodaj':null, openAddHearingModal);
  const upcoming = DB.hearings.filter(h=>h.status!=='Zakończona');
  const body1 = document.createElement('div');
  body1.innerHTML = upcoming.length ? `<table><tbody>${upcoming.map((h,i)=>{ const idx = DB.hearings.indexOf(h); return `<tr><td><b>${esc(h.plaintiff)} v. ${esc(h.defendant)}</b><div class="dim" style="margin-top:3px">${esc(h.type)} — <a href="#" data-open="${esc(h.related)}">${esc(h.related)}</a></div>${showCases?`<div style="margin-top:6px" data-caselink-idx="${idx}">${caseLinkCell(h)}</div>`:''}</td><td class="mono" style="text-align:right;white-space:nowrap">${esc(h.datetime)}</td></tr>`; }).join('')}</tbody></table>`

  body2.innerHTML = past.length ? past.map(h=>{ const idx = DB.hearings.indexOf(h); return `<div class="doc-item" style="align-items:flex-start"><div class="di-name"><div class="di-meta" style="margin-bottom:3px">${esc(h.datetime)} — ${badgeFor(h.status)}</div><b>${esc(h.plaintiff)} v. ${esc(h.defendant)}</b> — <a href="#" data-open="${esc(h.related)}">${esc(h.related)}</a><br><span class="dim" style="font-size:11px">${esc(h.type)} (${esc(h.publicity)})</span>${showCases?`<div style="margin-top:6px" data-caselink-idx="${idx}">${caseLinkCell(h)}</div>`:''}</div></div>`; }).join('')
    : `<div class="empty-state"><div class="t1" style="font-style:italic">Archiwum jest puste.</div></div>`;

      <div class="di-name"><b>${esc(g.name)}</b> — ${esc(g.members)} członków<br><span class="di-meta">${g.registered?'zarejestrowana':'niezarejestrowana'}</span>

      : `<div class="empty-state"><div class="t1" style="font-style:italic">Baza jest pusta.</div></div>`;
    listR.querySelectorAll('[data-edit]').forEach(el=> el.onclick=()=>openGangGroupModal(DB.gangGroups[Number(el.dataset.edit)]));
    listR.querySelectorAll('[data-del]').forEach(el=> el.onclick=()=>{ confirmDelete('Usunąć tę grupę z bazy?', ()=>{ DB.gangGroups.splice(Number(el.dataset.del),1); saveDB(); toast('Grupa usunięta.','ok'); drawR(); }); });

      <div class="stat-box"><div class="num">${DEPARTMENTS.length}</div><div class="lbl">Departamentów</div></div>

  const body = document.createElement('div');
  panel.appendChild(body);
  main.appendChild(panel);

  function permSummary(u){
    if(u.isAdmin) return `<span class="perm-pill pp-write">PEŁNY DOSTĘP (ADMIN)</span>`;
    const writes = MODULES.filter(m=> u.permissions && u.permissions[m.key]==='write');
    const reads = MODULES.filter(m=> u.permissions && u.permissions[m.key]==='read');
    if(!writes.length && !reads.length) return `<span class="dim" style="font-size:11.5px">brak nadanych uprawnień</span>`;
    return writes.map(m=>`<span class="perm-pill pp-write">${m.label}: zapis</span>`).join('') + reads.map(m=>`<span class="perm-pill pp-read">${m.label}: odczyt</span>`).join('');
  }

  function draw(){
    body.innerHTML = `<table>
      <thead><tr><th>Imię i nazwisko</th><th>Login</th><th>Stanowisko</th><th>Departament</th><th>Uprawnienia</th><th></th></tr></thead>
      <tbody>${DB.users.map((u,idx)=>`
        <tr>
          <td><b>${esc(u.name)}</b>${u.isAdmin?' <span class="badge badge-purple">ADMIN</span>':''}</td>
          <td class="mono">${esc(u.login)}</td>
          <td class="dim">${esc(u.title)||'—'}</td>
          <td><span class="badge badge-blue">${deptName(u.department)}</span></td>
          <td style="max-width:340px">${permSummary(u)}</td>
          <td><div class="row-actions">
            <button class="icon-btn" data-edit="${idx}">⚙</button>
            ${u.login!==CURRENT_USER.login ? `<button class="icon-btn danger" data-del="${idx}">🗑</button>` : ''}
          </div></td>
        </tr>`).join('')}</tbody></table>`;
    body.querySelectorAll('[data-edit]').forEach(el=> el.onclick=()=>openUserModal(DB.users[Number(el.dataset.edit)]));
    body.querySelectorAll('[data-del]').forEach(el=> el.onclick=()=>{
      const u = DB.users[Number(el.dataset.del)];
      if(u.isAdmin && DB.users.filter(x=>x.isAdmin).length<=1){ toast('Nie można usunąć jedynego administratora systemu.','err'); return; }
      confirmDelete(`Czy na pewno chcesz trwale usunąć konto <b>${u.name}</b> (${u.login})? Utraci ono dostęp do systemu.`, ()=>{
        DB.users.splice(Number(el.dataset.del),1); saveDB(); toast('Konto użytkownika usunięte.','ok'); draw();
      });
    });
  }
  draw();
}

    <div class="form-row">
      <div class="field"><label>Imię i nazwisko</label><input id="u-name" value="${isEdit?esc(existing.name):''}"></div>
      <div class="field"><label>Stanowisko</label><input id="u-title" value="${isEdit?esc(existing.title||''):''}" placeholder="np. Zastępca Prokuratora"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Login</label><input id="u-login" value="${isEdit?esc(existing.login):''}"></div>
      <div class="field"><label>Hasło${isEdit?' (zostaw puste, aby nie zmieniać)':''}</label><input type="password" id="u-pass" value="" autocomplete="new-password" placeholder="${isEdit?'••••••••':'Ustaw hasło dostępu'}"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>Departament (routing Poczty)</label>
        <select id="u-dept">${DEPARTMENTS.map(d=>`<option value="${d.key}" ${isEdit&&existing.department===d.key?'selected':''}>${d.name}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Rola w systemie</label>
        <select id="u-admin"><option value="false" ${isEdit&&!existing.isAdmin?'selected':''}>Urzędnik (uprawnienia wg tabeli poniżej)</option><option value="true" ${isEdit&&existing.isAdmin?'selected':''}>Administrator systemu (pełny dostęp)</option></select>
      </div>
    </div>
    <div class="field" id="perm-matrix-wrap">
      <label>Uprawnienia do modułów</label>
      <table class="perm-matrix">
        <thead><tr><th>Moduł</th><th style="width:150px">Poziom dostępu</th></tr></thead>
        <tbody>${MODULES.map(m=>`
          <tr><td>${m.label}</td><td>
            <select id="perm-${m.key}">
              <option value="none" ${perms[m.key]==='none'?'selected':''}>Brak dostępu</option>
              <option value="read" ${perms[m.key]==='read'?'selected':''}>Odczyt</option>
              <option value="write" ${perms[m.key]==='write'?'selected':''}>Odczyt i zapis</option>
            </select>
          </td></tr>`).join('')}</tbody>
      </table>
    </div>
  `, `<button class="btn-ghost" onclick="closeModal()">Anuluj</button><button class="btn-add" id="save-user-btn">${isEdit?'Zapisz zmiany':'Utwórz konto'}</button>`);

  const adminSel = document.getElementById('u-admin');
  const matrixWrap = document.getElementById('perm-matrix-wrap');
  function syncMatrixVisibility(){ matrixWrap.style.display = adminSel.value==='true' ? 'none' : 'block'; }
  adminSel.addEventListener('change', syncMatrixVisibility);
  syncMatrixVisibility();

  document.getElementById('save-user-btn').onclick = async ()=>{
    const name = document.getElementById('u-name').value.trim();
    const login = document.getElementById('u-login').value.trim();
    const pass = document.getElementById('u-pass').value; // bez trim — hasło może celowo zawierać spacje
    if(!name || !login || (!isEdit && !pass)){ toast('Uzupełnij imię i nazwisko, login oraz hasło.','err'); return; }
    if(pass && pass.length < 6){ toast('Hasło musi mieć co najmniej 6 znaków.','err'); return; }
    const dupe = DB.users.find(u=> u.login.toLowerCase()===login.toLowerCase() && u!==existing);
    if(dupe){ toast('Ten login jest już zajęty przez inne konto.','err'); return; }
    const isAdminVal = document.getElementById('u-admin').value === 'true';
    const newPerms = emptyPermissions();
    MODULES.forEach(m=>{ const sel = document.getElementById('perm-'+m.key); if(sel) newPerms[m.key] = sel.value; });
    const data = { name, title:document.getElementById('u-title').value.trim(), login,
      department:document.getElementById('u-dept').value, isAdmin:isAdminVal, permissions:newPerms };
    const btn = document.getElementById('save-user-btn'); btn.disabled = true;
    if(isEdit){
      if(existing.isAdmin && !isAdminVal && DB.users.filter(u=>u.isAdmin).length<=1){ toast('Nie można odebrać uprawnień administratora jedynemu adminowi.','err'); btn.disabled=false; return; }
      Object.assign(existing, data);
      if(pass) await setUserPassword(existing, pass);
      if(existing.login===CURRENT_USER.login) CURRENT_USER = existing;
    } else {
      data.created = nowStamp();
      await setUserPassword(data, pass);
      DB.users.push(data);
    }
    saveDB(); closeModal(); toast(isEdit?'Konto zaktualizowane.':'Nowe konto utworzone.','ok'); navigate('settings');
  };
}

/* -------------------- BOOT -------------------- */
function updateClock(){
  const d = new Date(); const p=n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent = `Los Santos, San Andreas · ${p(d.getMonth()+1)}/${p(d.getDate())}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
let idleTimer = null;
function resetIdleTimer(){
  if(!CURRENT_USER) return;
  if(idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(()=>{ toast('Sesja wygasła z powodu braku aktywności.','err'); setTimeout(logout, 900); }, IDLE_LIMIT_MS);
}
['mousemove','keydown','mousedown','scroll','touchstart'].forEach(evt=> document.addEventListener(evt, resetIdleTimer, {passive:true}));

function enterApp(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('cur-user-name').textContent = CURRENT_USER.name;
  document.getElementById('cur-user-role').textContent = CURRENT_USER.title || (CURRENT_USER.isAdmin?'Administrator systemu':deptName(CURRENT_USER.department));
  document.getElementById('cur-user-avatar').textContent = CURRENT_USER.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  navigate(CURRENT_USER.isAdmin ? 'postal' : 'postal');
  updateClock();
  setInterval(updateClock, 1000);
  resetIdleTimer();
}
document.getElementById('login-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const btn = e.target.querySelector('button[type="submit"]');
  const origLabel = btn.textContent;
  btn.disabled = true; btn.textContent = 'Weryfikacja danych...';
  const res = await tryLogin(u, p);
  btn.disabled = false; btn.textContent = origLabel;
  if(res.ok){ errEl.style.display='none'; enterApp(); }
  else{
    errEl.textContent = res.locked
      ? `Zbyt wiele nieudanych prób logowania. Konto tymczasowo zablokowane — spróbuj ponownie za ${res.secs}s.`
      : 'Nieprawidłowy login lub hasło.';
    errEl.style.display='block';
    document.getElementById('login-pass').value='';
  }
});
document.getElementById('btn-logout').addEventListener('click', logout);

(async function init(){
  loadDB();
  await migrateLegacyPasswords();
  if(restoreSession()){ enterApp(); }
})();
</script>
</body>
</html>
